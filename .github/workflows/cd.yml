name: CD

on:
  # Only deploy when CI passes on main — prevents deploying broken code
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  deploy:
    name: Deploy to local IIS
    runs-on: self-hosted
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Publish
        run: dotnet publish src/Web/Web.csproj -c Release -o "${{ github.workspace }}\publish" --no-self-contained

      - name: Backup current deployment
        shell: powershell
        run: |
          $site = "${{ vars.IIS_SITE_PATH }}"
          $backup = "${site}_backup"
          if (Test-Path $site) {
            if (Test-Path $backup) { Remove-Item $backup -Recurse -Force }
            Copy-Item -Path $site -Destination $backup -Recurse
          }

      - name: Stop app pool
        shell: powershell
        run: |
          Import-Module WebAdministration
          $pool = "${{ vars.IIS_APP_POOL }}"
          if ((Get-WebAppPoolState -Name $pool).Value -eq "Started") {
            Stop-WebAppPool -Name $pool
            $t = 30
            while ((Get-WebAppPoolState -Name $pool).Value -ne "Stopped" -and $t -gt 0) {
              Start-Sleep -Seconds 1; $t--
            }
          }

      - name: Deploy files
        shell: powershell
        run: Copy-Item -Path "${{ github.workspace }}\publish\*" -Destination "${{ vars.IIS_SITE_PATH }}" -Recurse -Force

      - name: Start app pool
        shell: powershell
        if: always()
        run: |
          Import-Module WebAdministration
          Start-WebAppPool -Name "${{ vars.IIS_APP_POOL }}"
